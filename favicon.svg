<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <!-- Sleek metallic golden gradient -->
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffe680" />
      <stop offset="30%" stop-color="#f5a623" />
      <stop offset="70%" stop-color="#d97706" />
      <stop offset="100%" stop-color="#92400e" />
    </linearGradient>
  </defs>

  <!-- Dark blue premium background disc for high contrast on light/dark browser tabs -->
  <circle cx="16" cy="16" r="15" fill="#0d0d1a" stroke="rgba(255,255,255,0.1)" stroke-width="1.5" />

  <!-- Trophy shape -->
  <!-- Cup body -->
  <path d="M10,9 L22,9 C22,16 20,18 16,18 C12,18 10,16 10,9 Z" fill="url(#gold)" />
  
  <!-- Left Handle -->
  <path d="M10,11 C8,11 7,12.5 7,14 C7,15.5 8,16 10,16" fill="none" stroke="url(#gold)" stroke-width="1.5" stroke-linecap="round" />
  
  <!-- Right Handle -->
  <path d="M22,11 C24,11 25,12.5 25,14 C25,15.5 24,16 22,16" fill="none" stroke="url(#gold)" stroke-width="1.5" stroke-linecap="round" />
  
  <!-- Stem -->
  <path d="M14,18 L18,18 L17,22 L15,22 Z" fill="url(#gold)" />
  
  <!-- Base -->
  <rect x="12" y="22" width="8" height="2" rx="0.5" fill="url(#gold)" />
  
  <!-- Star emblem or shine on the cup for success -->
  <path d="M16,11.5 L16.5,12.7 L17.7,12.9 L16.8,13.7 L17.1,14.9 L16,14.2 L14.9,14.9 L15.2,13.7 L14.3,12.9 L15.5,12.7 Z" fill="#ffffff" opacity="0.95" />
</svg>
